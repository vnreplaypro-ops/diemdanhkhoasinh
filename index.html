<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Điểm Danh Khóa Sinh</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { 
            --primary: #2c3e50; 
            --accent: #e67e22; 
            --success: #27ae60; 
            --danger: #c0392b; 
            --bg: #f5f6fa;
        }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background: var(--bg); color: #333;
            display: flex; justify-content: center; align-items: center;
        }
        
        .card { 
            width: 100%; max-width: 420px; height: 100%; max-height: 840px;
            background: white; padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        
        .top-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        
        h2, h3 { margin: 0 0 10px 0; color: var(--primary); text-align: center; font-size: 22px; }
        label { font-weight: bold; font-size: 14px; color: #555; margin-top: 10px; display: block; }
        
        select, input, button { 
            width: 100%; padding: 14px; margin: 8px 0; 
            font-size: 16px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; 
        }
        button { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; }
        
        .admin-tabs { display: none; margin-bottom: 10px; gap: 5px; }
        .tab-btn { background: #dcdde1; color: #333; width: 50%; margin: 0; padding: 10px; font-size: 14px; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        #main-app, #report-view, #group-select-container { display: none; }
        
        /* HIỆU CHỈNH LẠI GIAO DIỆN QUÉT MÃ GỐC ĐỂ VỪA ĐẸP VỪA ỔN ĐỊNH */
        #reader { width: 100%; border-radius: 12px; overflow: hidden; margin-top: 5px; border: 1px solid #eee !important; }
        #reader video { border-radius: 12px; object-fit: cover; width: 100%; }
        
        /* 1. Ẩn hoàn toàn các đường link linh tinh và chữ thừa */
        #reader a { display: none !important; }
        #reader span { font-size: 0 !important; } /* Ẩn chữ Select Camera */
        
        /* 2. Ẩn triệt để ô chọn Camera (Dropdown) và Nút Stop */
        #reader select { display: none !important; }
        #html5-qrcode-button-camera-stop { display: none !important; }
        
        /* 3. Làm đẹp nút bấm xin quyền và bắt đầu quét mặc định */
        #reader button { 
            background: var(--accent) !important; color: white !important; 
            border: none !important; padding: 14px !important; 
            border-radius: 10px !important; font-weight: bold !important; 
            cursor: pointer !important; width: 100% !important; margin: 10px 0 !important;
            font-size: 15px !important; text-transform: uppercase;
        }

        .manual-box { display: flex; gap: 8px; margin-top: 15px; }
        .manual-box input { margin: 0; background: #f8f9fa; }
        .manual-box button { width: auto; white-space: nowrap; margin: 0; background: var(--primary); padding: 0 20px; }
        
        /* POPUP Ở GIỮA MÀN HÌNH */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-box { 
            background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; 
            text-align: left; box-shadow: 0 15px 35px rgba(0,0,0,0.3); animation: modalShow 0.3s ease-out;
        }
        @keyframes modalShow { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-box h3 { border-bottom: 2px solid #f1f1f1; padding-bottom: 10px; text-align: center; color: var(--success); }
        .modal-box p { margin: 12px 0; font-size: 16px; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        .modal-box span { font-weight: bold; color: var(--primary); float: right; }
        
        /* BÁO CÁO ADMIN */
        .grid-report { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .rep-item { background: #f8f9fa; padding: 10px; border-radius: 8px; border-left: 4px solid var(--primary); }
        .rep-item h4 { margin: 0 0 3px 0; font-size: 12px; color: #7f8c8d; }
        .rep-item p { margin: 0; font-size: 16px; font-weight: bold; color: var(--primary); }
        .rep-item.ok { border-left-color: var(--success); }
        .rep-item.err { border-left-color: var(--danger); }
        
        .absent-wrapper { margin-top: 15px; background: #fff5f5; padding: 12px; border-radius: 8px; border: 1px solid #fbc4c4; max-height: 200px; overflow-y: auto;}
        .absent-list { padding-left: 20px; margin: 5px 0 0 0; font-size: 14px;}
        .absent-list li { margin-bottom: 10px; }
        .copy-btn { width: auto; display: inline-block; padding: 4px 8px; margin-left: 5px; font-size: 11px; background: #34495e; color: white; border-radius: 4px; }
        
        .logout-btn { background: var(--danger); margin: 10px 0 0 0; font-size: 15px; padding: 12px; }
    </style>
</head>
<body>

<div class="card">
    <div class="top-content">
        <div id="login-section">
            <h2 style="color: var(--accent); margin-top: 20px;">HỆ THỐNG ĐIỂM DANH</h2>
            <label>Loại tài khoản:</label>
            <select id="account-type" onchange="toggleAccountType(this.value)">
                <option value="trung_nhom">Trưởng Nhóm (8 Chúng)</option>
                <option value="admin">Quản Trị Viên (Admin)</option>
            </select>
            <div id="group-select-container">
                <label>Chọn Chúng (Nhóm):</label>
                <select id="group-name">
                    <option value="BỒ ĐỀ">BỒ ĐỀ</option><option value="LIÊN HOA">LIÊN HOA</option>
                    <option value="LỤC HÒA">LỤC HÒA</option><option value="TỈNH THỨC">TỈNH THỨC</option>
                    <option value="TỪ BI">TỪ BI</option><option value="TRÍ TUỆ">TRÍ TUỆ</option>
                    <option value="VÔ NGÃ">VÔ NGÃ</option><option value="VỊ THA">VỊ THA</option>
                </select>
            </div>
            <label>Mật khẩu:</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu">
            <button onclick="handleLogin()" style="margin-top: 15px;">ĐĂNG NHẬP</button>
        </div>

        <div class="admin-tabs" id="admin-menu">
            <button class="tab-btn active" id="btn-tab-scan" onclick="switchTab('scan')">Điểm Danh</button>
            <button class="tab-btn" id="btn-tab-rep" onclick="switchTab('report')">Báo Cáo</button>
        </div>

        <div id="main-app">
            <p style="font-size: 13px; color:#7f8c8d; margin:5px 0 10px 0; text-align:center;">
                Đang trực: <span id="user-display" style="font-weight:bold; color:var(--accent);"></span>
            </p>
            
            <div id="reader"></div>
            
            <div class="manual-box">
                <input type="text" id="manual-id" placeholder="Nhập mã thủ công...">
                <button onclick="processCode(document.getElementById('manual-id').value)">TÌM</button>
            </div>
        </div>

        <div id="report-view">
            <h3>THỐNG KÊ HÔM NAY</h3>
            <button onclick="loadAdminReport()" style="background:#3498db; margin-bottom:10px;">Làm mới số liệu</button>
            <div class="grid-report" id="report-data"></div>
            <div id="absent-data"></div>
        </div>
    </div>

    <button id="logout-section" class="logout-btn" onclick="handleLogout()" style="display: none;">Đăng Xuất</button>
</div>

<div class="modal-overlay" id="confirm-modal">
    <div class="modal-box">
        <h3>XÁC NHẬN</h3>
        <p>Họ Tên: <span id="m-ten" style="color:var(--accent);"></span></p>
        <p>Mã Số: <span id="m-ma"></span></p>
        <p>Chúng: <span id="m-chung"></span></p>
        <p>Ngày Sinh: <span id="m-ns"></span></p>
        <div style="display:flex; gap:12px; margin-top:25px;">
            <button onclick="closeModal()" style="background:#bdc3c7; color:#333; flex:1; margin:0;">HỦY</button>
            <button onclick="submitAttendance()" style="background:var(--success); flex:1.5; margin:0;">XÁC NHẬN</button>
        </div>
    </div>
</div>

<script>
    // Link gốc Google Apps Script của bạn
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzWhbVnxwDiPXk15Nr2cGyHfHgoRqQM4mCmIYGi0LbpiNrdOfQBcgc2JUWmhfSV04nnTg/exec';

    let loggedInUser = "";
    let userRole = "";
    let currentScannedCode = "";
    let html5QrcodeScanner; // Dùng lại bộ Scanner gốc có nút

    window.addEventListener('DOMContentLoaded', () => {
        const savedUser = localStorage.getItem('loggedInUser');
        const savedRole = localStorage.getItem('userRole');
        if (savedUser && savedRole) {
            loggedInUser = savedUser;
            userRole = savedRole;
            showAppView();
        }
    });

    function toggleAccountType(val) {
        document.getElementById('group-select-container').style.display = (val === 'admin') ? 'none' : 'block';
    }

    function handleLogin() {
        const type = document.getElementById('account-type').value;
        const pass = document.getElementById('password').value;
        if (type === 'admin') {
            if (pass === '12345@') { userRole = 'admin'; loggedInUser = 'Ban Quản Trị'; }
            else { alert('Sai mật khẩu Admin!'); return; }
        } else {
            if (pass === '12345') { userRole = 'leader'; loggedInUser = document.getElementById('group-name').value; }
            else { alert('Sai mật khẩu Trưởng nhóm!'); return; }
        }
        localStorage.setItem('loggedInUser', loggedInUser);
        localStorage.setItem('userRole', userRole);
        showAppView();
    }

    function showAppView() {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('logout-section').style.display = 'block';
        document.getElementById('user-display').innerText = loggedInUser;
        if (userRole === 'admin') document.getElementById('admin-menu').style.display = 'flex';
        startScanner();
    }

    function handleLogout() { 
        localStorage.clear();
        location.reload(); 
    }

    function switchTab(tab) {
        document.getElementById('btn-tab-scan').className = (tab === 'scan') ? 'tab-btn active' : 'tab-btn';
        document.getElementById('btn-tab-rep').className = (tab === 'report') ? 'tab-btn active' : 'tab-btn';
        document.getElementById('main-app').style.display = (tab === 'scan') ? 'block' : 'none';
        document.getElementById('report-view').style.display = (tab === 'report') ? 'block' : 'none';
        if (tab === 'report') loadAdminReport();
    }

    function startScanner() {
        // Khởi tạo bộ quét gốc có nút bấm
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 15, 
            qrbox: {width: 220, height: 220},
            rememberLastUsedCamera: true
        }, false);
        html5QrcodeScanner.render((text) => processCode(text), () => {});
    }

    function processCode(code) {
        if (!code || code.trim() === "") return;
        currentScannedCode = code.trim();
        if (html5QrcodeScanner) html5QrcodeScanner.pause(true);

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "getInfo", qr: currentScannedCode }),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") {
                document.getElementById('m-ma').innerText = data.student.ma;
                document.getElementById('m-ten').innerText = data.student.ten;
                document.getElementById('m-ns').innerText = data.student.ngaySinh;
                document.getElementById('m-chung').innerText = data.student.chung;
                document.getElementById('confirm-modal').style.display = 'flex';
            } else {
                alert(data.message);
                if (html5QrcodeScanner) html5QrcodeScanner.resume();
            }
        })
        .catch(() => {
            alert("Lỗi kết nối!");
            if (html5QrcodeScanner) html5QrcodeScanner.resume();
        });
    }

    function closeModal() {
        document.getElementById('confirm-modal').style.display = 'none';
        document.getElementById('manual-id').value = "";
        if (html5QrcodeScanner) html5QrcodeScanner.resume();
    }

    function submitAttendance() {
        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "confirm", qr: currentScannedCode, user: loggedInUser }),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            closeModal();
        })
        .catch(() => {
            alert("Lỗi ghi dữ liệu!");
            closeModal();
        });
    }

    function copyText(text) {
        navigator.clipboard.writeText(text).then(() => alert("Đã copy SĐT: " + text));
    }

    function loadAdminReport() {
        const repDiv = document.getElementById('report-data');
        const absDiv = document.getElementById('absent-data');
        repDiv.innerHTML = "<p style='grid-column:1/3; text-align:center;'>Đang tính...</p>";
        absDiv.innerHTML = "";
        
        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "report" }),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === "success") {
                repDiv.innerHTML = `
                    <div class="rep-item"><h4>Tổng Khóa Sinh</h4><p>${data.total}</p></div>
                    <div class="rep-item err"><h4>Đi Muộn</h4><p>${data.muon}</p></div>
                    <div class="rep-item ok"><h4>Đã Đến</h4><p>${data.den} (${data.pctDen}%)</p></div>
                    <div class="rep-item err"><h4>Vắng Sáng</h4><p>${data.total - data.den} (${data.pctVang}%)</p></div>
                `;

                let absentHtml = `
                    <div class="absent-wrapper">
                        <h4 style="margin:0 0 10px 0; color:var(--danger); font-size:14px;">KHÓA SINH VẮNG MẶT:</h4>
                        <ol class="absent-list">
                `;
                if(data.absent && data.absent.length > 0) {
                    data.absent.forEach(student => {
                        let sdt = String(student.sdt).trim();
                        if (sdt && !sdt.startsWith('0')) sdt = '0' + sdt;
                        absentHtml += `<li><strong>${student.ten}</strong> - ${student.chung}<br>SĐT: <a href="tel:${sdt}">${sdt}</a> <button class="copy-btn" onclick="copyText('${sdt}')">Copy</button></li>`;
                    });
                } else absentHtml += `<li>Không có ai vắng mặt.</li>`;
                absDiv.innerHTML = absentHtml + `</ol></div>`;
            }
        });
    }
</script>
</body>
</html>
